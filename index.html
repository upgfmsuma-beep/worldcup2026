<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WFC2026 Ver.21 AUTO UPDATE</title>
<style>
body{margin:0;background:#081423;color:#eaf6ff;font-family:Segoe UI,Yu Gothic UI,sans-serif}
.header{padding:15px;background:linear-gradient(90deg,#0d2e5f,#2f7bd8);display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}
.card{background:#10233f;border:1px solid #5faeff;border-radius:12px;padding:12px}
h1,h2{margin:0}
.big{font-size:48px;font-weight:900;color:#8fd3ff}
</style>
</head>
<body>
<div class="header">
<h1>🏆 FIFA WORLD CUP 2026 GLOBAL COMMAND CENTER</h1>
<div id="clock"></div>
</div>

<div class="grid">
<div class="card">
<h2>🇯🇵 JAPAN COUNTDOWN</h2>
<div id="countdown" class="big">--</div>
</div>

<div class="card">
<h2>⚙ API STATUS</h2>
<div>API Key を入力してください</div>
</div>

<div class="card">
<h2>📅 TODAY MATCHES</h2>
<div id="matches">Loading...</div>
</div>

<div class="card">
<h2>🌎 STANDINGS</h2>
<div id="standings">Loading...</div>
</div>
</div>

<script>
const API_KEY ="06282F2eec734D8E89Af23A91A9187E4";

function clock(){
 document.getElementById("clock").innerText =
 new Date().toLocaleString("ja-JP",{hour12:false});
}
setInterval(clock,1000);clock();

const japanMatch = new Date("2026-06-21T13:00:00+09:00");
function countdown(){
 const d=japanMatch-new Date();
 const days=Math.floor(d/86400000);
 const hrs=Math.floor((d%86400000)/3600000);
 const min=Math.floor((d%3600000)/60000);
 document.getElementById("countdown").innerText=`${days}日 ${hrs}時間 ${min}分`;
}
setInterval(countdown,1000);countdown();

async function loadData(){
 if(API_KEY==="PASTE_YOUR_API_KEY_HERE") return;

 try{
   const r=await fetch("https://api.football-data.org/v4/competitions/WC/matches",{
      headers:{"X-Auth-Token":API_KEY}
   });
   const data=await r.json();
   document.getElementById("matches").innerHTML =
      (data.matches||[]).slice(0,5).map(m=>`${m.homeTeam.name} vs ${m.awayTeam.name}`).join("<br>");
 }catch(e){
   document.getElementById("matches").innerText="API取得エラー";
 }
}
loadData();
setInterval(loadData,1800000);
</script>
</body>
</html>
